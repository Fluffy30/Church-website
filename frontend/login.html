<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Manifest Ministries</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="site-header">
    <div class="container nav">
        <a href="index.html" class="nav-brand"><span class="cross">✝</span> Grace Community Church</a>
        <button class="nav-toggle" aria-label="Toggle menu">☰</button>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="events.html">Events</a></li>
            <li><a href="prayer.html">Prayer Requests</a></li>
            <li><a href="register.html">Connect / Register</a></li>
            <li data-auth="guest"><a href="login.html" class="active">Login</a></li>
        </ul>
    </div>
</header>

<section class="auth-page">
    <div class="form-card">
        <h2 class="text-center">Member Login</h2>
        <p class="muted text-center" style="margin-bottom:20px;">Log in to message your groups and view your account.</p>
        <div id="alert-box"></div>
        <form id="login-form">
            <label for="email">Email</label>
            <input type="email" id="email" required placeholder="you@example.com">

            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="••••••••">

            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Log In</button>
            </div>
        </form>
        <p class="text-center muted" style="margin-top:20px;">
            Don't have an account yet? <a href="signup.html">Sign up here</a>
        </p>
    </div>
</section>

<footer class="site-footer">
    <div class="container footer-small">&copy; 2026 Grace Community Church. All rights reserved.</div>
</footer>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const alertBox = document.getElementById("alert-box");
        const submitBtn = document.getElementById("submit-btn");
        submitBtn.disabled = true;
        submitBtn.textContent = "Logging in…";
        try {
            const { token, user } = await Api.post("/auth/login", {
                email: document.getElementById("email").value.trim(),
                password: document.getElementById("password").value,
            }, { auth: false });
            Auth.setSession(token, user);
            window.location.href = ["admin", "leader"].includes(user.role) ? "dashboard.html" : "messages.html";
        } catch (err) {
            showAlert(alertBox, err.message);
            submitBtn.disabled = false;
            submitBtn.textContent = "Log In";
        }
    });
</script>
</body>
</html>
