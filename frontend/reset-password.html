<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password — Grace Community Church</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="site-header">
    <div class="container nav">
        <a href="index.html" class="nav-brand"><span class="cross">✝</span> Grace Community Church</a>
        <button class="nav-toggle" aria-label="Toggle menu">☰</button>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="events.html">Events</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </div>
</header>

<section class="auth-page">
    <div class="form-card">
        <h2 class="text-center">Set a New Password</h2>
        <div id="alert-box"></div>

        <form id="reset-form">
            <label for="password">New Password</label>
            <input type="password" id="password" required minlength="8" placeholder="At least 8 characters">
            <label for="confirm">Confirm New Password</label>
            <input type="password" id="confirm" required minlength="8" placeholder="Re-enter your new password">
            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Set New Password</button>
            </div>
        </form>

        <p class="text-center muted" style="margin-top:20px;">
            <a href="login.html">Back to login</a>
        </p>
    </div>
</section>

<footer class="site-footer">
    <div class="container footer-small">&copy; 2026 Grace Community Church. All rights reserved. &middot; <a href="privacy.html">Privacy Policy</a></div>
</footer>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    const alertBox = document.getElementById("alert-box");
    const form = document.getElementById("reset-form");

    if (!token) {
        showAlert(alertBox, "This link is missing its reset token. Please request a new password reset link.");
        form.style.display = "none";
    }

    form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const password = document.getElementById("password").value;
        const confirm = document.getElementById("confirm").value;

        if (password !== confirm) {
            showAlert(alertBox, "Passwords do not match.");
            return;
        }

        const submitBtn = document.getElementById("submit-btn");
        submitBtn.disabled = true;
        submitBtn.textContent = "Saving…";

        try {
            const res = await Api.post("/auth/reset-password", { token, password }, { auth: false });
            showAlert(alertBox, res.message + " Redirecting to login…", "success");
            form.style.display = "none";
            setTimeout(() => (window.location.href = "login.html"), 2000);
        } catch (err) {
            showAlert(alertBox, err.message);
            submitBtn.disabled = false;
            submitBtn.textContent = "Set New Password";
        }
    });
</script>
</body>
</html>
