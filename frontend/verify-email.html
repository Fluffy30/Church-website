<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email — Grace Community Church</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="site-header">
    <div class="container nav">
        <a href="index.html" class="nav-brand"><span class="cross">✝</span> Grace Community Church</a>
        <button class="nav-toggle" aria-label="Toggle menu">☰</button>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="events.html">Events</a></li>
            <li data-auth="guest"><a href="login.html">Login</a></li>
        </ul>
    </div>
</header>

<section class="auth-page">
    <div class="form-card text-center">
        <h2 id="heading">Verifying your email…</h2>
        <div id="alert-box"></div>
        <p class="text-center muted" style="margin-top:20px;">
            <a href="login.html">Go to login</a>
        </p>
    </div>
</section>

<footer class="site-footer">
    <div class="container footer-small">&copy; 2026 Grace Community Church. All rights reserved. &middot; <a href="privacy.html">Privacy Policy</a></div>
</footer>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>
    (async function verify() {
        const params = new URLSearchParams(window.location.search);
        const token = params.get("token");
        const heading = document.getElementById("heading");
        const alertBox = document.getElementById("alert-box");

        if (!token) {
            heading.textContent = "Missing verification token";
            showAlert(alertBox, "This link is missing its verification token. Please request a new one from your account.");
            return;
        }

        try {
            const res = await Api.post("/auth/verify-email", { token }, { auth: false });
            heading.textContent = "Email Verified!";
            showAlert(alertBox, res.message, "success");
        } catch (err) {
            heading.textContent = "Verification Failed";
            showAlert(alertBox, err.message);
        }
    })();
</script>
</body>
</html>
