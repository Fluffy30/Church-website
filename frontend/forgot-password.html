<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — Grace Community Church</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="site-header">
    <div class="container nav">
        <a href="index.html" class="nav-brand"><span class="cross">✝</span> Grace Community Church</a>
        <button class="nav-toggle" aria-label="Toggle menu">☰</button>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="events.html">Events</a></li>
            <li><a href="prayer.html">Prayer Requests</a></li>
            <li><a href="register.html">Connect / Register</a></li>
            <li data-auth="guest"><a href="login.html">Login</a></li>
        </ul>
    </div>
</header>

<section class="auth-page">
    <div class="form-card">
        <h2 class="text-center">Reset Your Password</h2>
        <p class="muted text-center" style="margin-bottom:20px;">
            Enter your email and we'll get a reset link to you.
        </p>
        <div id="alert-box"></div>
        <form id="forgot-form">
            <label for="email">Email</label>
            <input type="email" id="email" required placeholder="you@example.com">
            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Send Reset Link</button>
            </div>
        </form>
        <p class="text-center muted" style="margin-top:20px;">
            <a href="login.html">Back to login</a>
        </p>
    </div>
</section>

<footer class="site-footer">
    <div class="container footer-small">&copy; 2026 Grace Community Church. All rights reserved. &middot; <a href="privacy.html">Privacy Policy</a></div>
</footer>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>
    document.getElementById("forgot-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const alertBox = document.getElementById("alert-box");
        const submitBtn = document.getElementById("submit-btn");
        submitBtn.disabled = true;
        submitBtn.textContent = "Sending…";
        try {
            const res = await Api.post("/auth/forgot-password", {
                email: document.getElementById("email").value.trim(),
            }, { auth: false });
            showAlert(alertBox, res.message, "success");
            e.target.reset();
        } catch (err) {
            showAlert(alertBox, err.message);
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Send Reset Link";
        }
    });
</script>
</body>
</html>
